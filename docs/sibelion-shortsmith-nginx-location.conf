# Shortsmith temporary public MP4 hosting for Instagram Graph API video_url.
# Add this location inside each sibelion.ddns.net server block before location /.
location /shortsmith/videos/ {
    alias /var/www/shortsmith/videos/;
    types { video/mp4 mp4; text/plain txt; }
    default_type application/octet-stream;
    add_header Cache-Control "public, max-age=86400";
    add_header Access-Control-Allow-Origin "*";
    limit_except GET HEAD { deny all; }
}
